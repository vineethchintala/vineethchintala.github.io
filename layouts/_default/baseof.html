<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}Vineeth Chintala{{ else }}{{ .Title }} - Vineeth Chintala{{ end }}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,600;1,300;1,600&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="/style.css">

  {{ if .IsHome }}
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Vineeth Chintala",
      "url": "https://vineethchintala.com",
      "jobTitle": "DST-Inspire Faculty Fellow",
      "description": "Mathematician and Author of Graphs, Games, Algorithms.",
      "hasCredential": [
        {
          "@type": "EducationalOccupationalCredential",
          "credentialCategory": "PhD in Mathematics",
          "recognizedBy": {
            "@type": "EducationalOrganization",
            "name": "TIFR Mumbai"
          }
        }
      ],
      "publishingPrinciples": "https://vineethchintala.com/book",
      "sameAs": [
        "https://github.com/vineethchintala",
        "https://www.linkedin.com/in/vineeth-chintala-phd"
      ]
    }
    </script>
  {{ end }}
</head>

<body>

  <div class="container">
    <header>
      <h1><a href="/">Vineeth Chintala</a></h1>
      <nav>
        <ul class="nav-tabs">
          <li><a href="/research">research</a></li>
          <li><a href="/favourite-reads">reading</a></li>
          <li><a href="/book">book</a></li>
          <li><a href="/movies">cinema</a></li>
        </ul>
      </nav>
    </header>

    {{ block "main" . }}{{ end }}

    <footer>
      &copy; 2026 Vineeth Chintala
    </footer>
  </div>

</body>

</html>
